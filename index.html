<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TRADER PRO - AUDIO LIVE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: white; margin: 0; padding: 0; }
        .header { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { color: #3d5afe; font-weight: bold; font-size: 20px; }
        .btn-audio { background: #3d5afe; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .container { display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        #chart-section { height: 400px; border-radius: 8px; overflow: hidden; border: 1px solid #222; }
        .signals-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 600px) { .signals-grid { grid-template-columns: 1fr 1fr; } }
        .signal-card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">AI TRADER PRO</div>
        <button class="btn-audio" onclick="enableAudio()">🔔 OVOZNI YOQISH</button>
    </div>

    <div class="container">
        <div id="chart-section">
            <div id="tradingview_main"></div>
        </div>

        <div class="signals-grid">
            <div class="signal-card">
                <div style="color: #888; margin-bottom: 5px;">BITCOIN ANALIZ</div>
                <div id="btc-analiz">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                        {
                            "interval": "1m",
                            "width": "100%",
                            "isTransparent": true,
                            "height": "320",
                            "symbol": "BINANCE:BTCUSDT",
                            "showIntervalTabs": false,
                            "displayMode": "single",
                            "locale": "en",
                            "colorTheme": "dark"
                        }
                        </script>
                    </div>
                </div>
            </div>

            <div class="signal-card" style="display: flex; flex-direction: column; justify-content: center;">
                <h3 id="status-text">Monitoring ishlamoqda...</h3>
                <p id="alert-log" style="font-size: 12px; color: #555;">Kutilmoqda...</p>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Grafikni yuklash
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "theme": "dark", "container_id": "tradingview_main"
        });

        // Ovoz berish funksiyasi
        let audioEnabled = false;
        function enableAudio() {
            audioEnabled = true;
            document.querySelector('.btn-audio').innerText = "✅ OVOZ YOQILDI";
            speak("Tizim ishga tushdi");
        }

        function speak(text) {
            if (audioEnabled) {
                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.lang = 'en-US'; // Signallar inglizcha bo'ladi: "Strong Buy"
                window.speechSynthesis.speak(msg);
            }
        }

        // Signalni tekshirish imitatsiyasi (Haqiqiy analiz vidjetdan olinadi)
        // Har 30 soniyada bozorni "tekshiradi"
        setInterval(() => {
            if (audioEnabled) {
                // Bu yerda vidjetdagi "Strong Buy" degan yozuvni qidirish logikasi bo'ladi
                // Hozircha sinov uchun:
                console.log("Checking market...");
                document.getElementById('alert-log').innerText = "Oxirgi tekshiruv: " + new Date().toLocaleTimeString();
            }
        }, 30000);
    </script>
</body>
</html>
