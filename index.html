<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TRADER PRO - SMART SIGNAL</title>
    <style>
        :root { --primary: #3d5afe; --bg: #050505; --success: #00ff00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        /* Kirish oynasi */
        #auth-screen { padding: 80px 20px; display: block; }
        input { padding: 15px; width: 85%; max-width: 300px; border-radius: 10px; border: 1px solid #333; background: #111; color: white; margin-bottom: 15px; text-align: center; font-size: 16px; }
        
        /* Terminal qismi */
        #main-terminal { display: none; padding: 10px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        .card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 25px; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .acc-value { font-size: 45px; font-weight: bold; color: var(--success); text-shadow: 0 0 15px rgba(0,255,0,0.3); }
        
        button { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        .status-dot { height: 10px; width: 10px; background-color: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color: var(--primary); margin-bottom: 5px;">AI TRADER PRO</h1>
        <p style="color: #666; margin-bottom: 30px;">Premium Signal Platform</p>
        
        <input type="password" id="access-key" placeholder="Kirish kalitini yozing">
        <br>
        <button onclick="checkKey()">KIRISH</button>
        
        <p style="margin-top: 40px; font-size: 13px; color: #444;">
            Ruxsat olish uchun admin bilan bog'laning.
        </p>
    </div>

    <div id="main-terminal">
        <div style="text-align: left; padding: 5px 15px;">
            <span class="status-dot"></span> <span style="font-size: 12px; color: #888;">AI SCANNER ACTIVE</span>
        </div>

        <div class="card">
            <div style="font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 2px;">AI Accuracy</div>
            <div class="acc-value" id="accuracy-val">--%</div>
            
            <hr style="border: 0.1px solid #222; margin: 20px 0;">
            
            <h2 id="pair-name" style="margin: 0; font-size: 28px;">SCANNING...</h2>
            <div id="action-hint" style="font-size: 22px; font-weight: bold; margin-top: 10px;">---</div>
        </div>

        <div id="tv-chart" style="height: 380px; margin-top: 15px; border-radius: 15px; overflow: hidden; border: 1px solid #222;"></div>
        
        <p style="font-size: 11px; color: #333; margin-top: 15px;">v2.0 Private Access Mode</p>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // --- ADMIN: BU YERGA PAROLLARNI YOZASAN ---
        const validKeys = ["7777", "shavkat", "vip100", "trader"];

        function checkKey() {
            const key = document.getElementById('access-key').value;
            if (validKeys.includes(key)) {
                startSystem();
            } else {
                alert("Kalit noto'g'ri! Iltimos, qaytadan urinib ko'ring.");
            }
        }

        function startSystem() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-terminal').style.display = 'block';
            
            // TradingView grafigini yuklash
            new TradingView.widget({
                "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "theme": "dark", "container_id": "tv-chart", "locale": "en"
            });

            // Signal Logikasi (85% filtr bilan)
            setInterval(() => {
                // 60 dan 99 gacha aniqlikni hisoblash
                let acc = Math.floor(Math.random() * (99 - 60) + 60);
                document.getElementById('accuracy-val').innerText = acc + "%";

                if (acc >= 85) { 
                    // FAQAT 85% VA UNDAN YUQORI BO'LSA SIGNAL BERADI
                    document.getElementById('accuracy-val').style.color = "#00ff00";
                    document.getElementById('pair-name').innerText = "BTC / USDT";
                    document.getElementById('action-hint').innerText = "STRONG BUY ▲";
                    document.getElementById('action-hint').style.color = "#00ff00";
                    // Ovoz chiqarish (ixtiyoriy)
                    playSignalSound();
                } else {
                    // 85% DAN PAST BO'LSA SIGNALNI YASHIRADI
                    document.getElementById('accuracy-val').style.color = "#ff9800";
                    document.getElementById('pair-name').innerText = "WAITING...";
                    document.getElementById('action-hint').innerText = "ANALYZING MARKET";
                    document.getElementById('action-hint').style.color = "#444";
                }
            }, 6000); // Har 6 soniyada yangilanadi
        }

        function playSignalSound() {
            const msg = new SpeechSynthesisUtterance("New Signal Detected");
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
